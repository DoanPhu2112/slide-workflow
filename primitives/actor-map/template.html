<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Actor Map Primitive</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section class="slide">
      <div class="copy">
        <p class="eyebrow">Actor Map</p>
        <h1>Who Shapes the Shipment Workflow</h1>
        <p>Every participant touches trust, speed, or compliance from a different angle.</p>
      </div>

      <div class="map">
        <svg viewBox="0 0 600 360" aria-hidden="true">
          <line x1="300" y1="180" x2="300" y2="52"></line>
          <line x1="300" y1="180" x2="115" y2="120"></line>
          <line x1="300" y1="180" x2="485" y2="120"></line>
          <line x1="300" y1="180" x2="145" y2="292"></line>
          <line x1="300" y1="180" x2="455" y2="292"></line>
        </svg>
        <div class="node center">Digital Bill of Lading</div>
        <div class="node top">Carrier</div>
        <div class="node left">Exporter</div>
        <div class="node right">Bank</div>
        <div class="node bottom-left">Importer</div>
        <div class="node bottom-right">Customs</div>
      </div>
    </section>
  </body>
</html>
