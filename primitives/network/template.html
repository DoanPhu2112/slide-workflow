<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Network Primitive</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section class="slide">
      <p class="eyebrow">Network</p>
      <div class="heading">
        <h1>Partner Network Around the Core Platform</h1>
        <p>Each node contributes reach, validation, or transaction throughput.</p>
      </div>

      <div class="graph">
        <svg viewBox="0 0 640 320" aria-hidden="true">
          <line x1="320" y1="160" x2="140" y2="70"></line>
          <line x1="320" y1="160" x2="500" y2="70"></line>
          <line x1="320" y1="160" x2="120" y2="245"></line>
          <line x1="320" y1="160" x2="520" y2="245"></line>
          <line x1="140" y1="70" x2="500" y2="70"></line>
          <line x1="120" y1="245" x2="520" y2="245"></line>
        </svg>
        <div class="node center">Platform Hub</div>
        <div class="node a">Carrier Cloud</div>
        <div class="node b">Bank Gateway</div>
        <div class="node c">Port Systems</div>
        <div class="node d">Customs API</div>
      </div>
    </section>
  </body>
</html>
