<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lifecycle Primitive</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section class="slide">
      <div class="copy">
        <p class="eyebrow">Lifecycle</p>
        <h1>Document Lifecycle from Issuance to Archive</h1>
        <p>The process repeats, but ownership and evidence must stay intact at every stage.</p>
      </div>

      <div class="cycle">
        <div class="stage top">Issue</div>
        <div class="stage right-top">Endorse</div>
        <div class="stage right-bottom">Transfer</div>
        <div class="stage bottom">Surrender</div>
        <div class="stage left">Archive</div>
        <div class="hub">Trusted Record</div>
      </div>
    </section>
  </body>
</html>
