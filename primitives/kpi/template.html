<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KPI Primitive</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section class="slide">
      <div class="heading">
        <div>
          <p class="eyebrow">KPI</p>
          <h1>Quarterly Operating Snapshot</h1>
        </div>
        <p>Efficiency and throughput moved together after document exceptions were reduced.</p>
      </div>

      <div class="grid">
        <article class="metric">
          <span class="label">Issued</span>
          <strong>12.4k</strong>
          <small>+28% QoQ</small>
        </article>
        <article class="metric">
          <span class="label">Cycle Time</span>
          <strong>4.2h</strong>
          <small>-31% QoQ</small>
        </article>
        <article class="metric">
          <span class="label">Error Rate</span>
          <strong>1.6%</strong>
          <small>-0.9 pts</small>
        </article>
        <article class="metric">
          <span class="label">Partners Live</span>
          <strong>37</strong>
          <small>+9 this quarter</small>
        </article>
      </div>

      <div class="insight">
        <div class="bar"><span></span></div>
        <p>Best gain came from auto-validating carrier fields before bank review.</p>
      </div>
    </section>
  </body>
</html>
